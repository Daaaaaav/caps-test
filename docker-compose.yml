version: '3.8'

services:
  # ──────────────────────────────────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: krb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-krbs}
      MYSQL_USER: ${DB_USERNAME:-krbs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    networks:
      - krb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Python LSTM Service
  # ──────────────────────────────────────────────────────────────────────────
  lstm-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: lstm-service
    container_name: krb-lstm
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - krb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────────────────────
  # Laravel Application (Nginx + PHP-FPM)
  # ──────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: laravel
    container_name: krb-app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-krbs}
      DB_USERNAME: ${DB_USERNAME:-krbs_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      LSTM_SERVICE_URL: http://lstm-service:8001
      SYSTEM_MODE: ${SYSTEM_MODE:-deployment}
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      lstm-service:
        condition: service_healthy
    networks:
      - krb-network

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx Web Server
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: krb-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - krb-network

# ──────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────
networks:
  krb-network:
    driver: bridge

# ──────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
